<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled - Notepad</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="screen notepad-screen">
    <div class="titlebar">
      <span class="titlebar-text"><span class="notepad-icon"></span> Untitled - Notepad</span>
      <div class="titlebar-buttons">
        <span class="titlebar-btn">_</span>
        <span class="titlebar-btn">&#9633;</span>
        <span class="titlebar-btn">X</span>
      </div>
    </div>

    <div class="notepad-menubar">
      <span class="notepad-menu"><u>F</u>ile</span>
      <span class="notepad-menu"><u>E</u>dit</span>
      <span class="notepad-menu"><u>S</u>earch</span>
      <span class="notepad-menu"><u>H</u>elp</span>
    </div>

    <div class="notepad-body">
      <div id="notepad-text" class="notepad-text"><span id="cursor" class="notepad-cursor"></span></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var NEIGHBOURS = {
    a:"sqwz",b:"vngh",c:"xdfv",d:"sfxce",e:"wrsdf",f:"dgcvr",
    g:"fhvbt",h:"gjbny",i:"ujko",j:"hknmu",k:"jlmi",l:"kop",
    m:"njk",n:"bhmj",o:"iklp",p:"ol",q:"wa",r:"edft",s:"awdxz",
    t:"rfgy",u:"yhji",v:"cfgb",w:"qase",x:"zsdc",y:"tghu",z:"asx",
    " ":"  "
  };

  var TYPO_CHANCE = 0.08;

  var textEl = document.getElementById("notepad-text");
  var cursorEl = document.getElementById("cursor");

  var currentTrackId = null;
  var isPlaying = false;
  var progressMs = 0;
  var durationMs = 0;
  var lastPollTime = 0;

  var schedule = [];    // [{time, action:"char"|"back"|"nl", char}]
  var scheduleIdx = 0;
  var buffer = "";

  function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function pickTypo(ch, seed) {
    var lower = ch.toLowerCase();
    var adj = NEIGHBOURS[lower];
    if (!adj) return ch === ch.toUpperCase() ? ch.toLowerCase() : ch.toUpperCase();
    var pick = adj[Math.floor(seededRandom(seed) * adj.length)];
    return ch === ch.toUpperCase() ? pick.toUpperCase() : pick;
  }

  function buildSchedule(lines) {
    schedule = [];
    scheduleIdx = 0;
    buffer = "";

    if (!lines || lines.length === 0) return;

    var seed = 1;

    for (var i = 0; i < lines.length; i++) {
      var lineStart = lines[i].time_ms;
      var lineEnd = (i + 1 < lines.length) ? lines[i + 1].time_ms : lineStart + 3000;
      var text = lines[i].text || "";

      if (text.trim() === "") {
        if (i > 0) schedule.push({ time: lineStart, action: "nl" });
        continue;
      }

      if (i > 0) {
        schedule.push({ time: lineStart, action: "nl" });
      }

      var events = [];
      for (var c = 0; c < text.length; c++) {
        seed++;
        var doTypo = seededRandom(seed) < TYPO_CHANCE && text[c] !== " " && text[c] !== "\n";
        if (doTypo) {
          seed++;
          var wrong = pickTypo(text[c], seed);
          events.push({ action: "char", char: wrong });
          events.push({ action: "back" });
          events.push({ action: "char", char: text[c] });
        } else {
          events.push({ action: "char", char: text[c] });
        }
      }

      var budget = (lineEnd - lineStart) * 0.85;
      var step = events.length > 1 ? budget / events.length : 0;

      for (var e = 0; e < events.length; e++) {
        var t = lineStart + step * e;
        events[e].time = t;
        schedule.push(events[e]);
      }
    }

    schedule.sort(function (a, b) { return a.time - b.time; });
  }

  function getPosition() {
    if (!isPlaying) return progressMs;
    var elapsed = performance.now() - lastPollTime;
    return Math.min(progressMs + elapsed, durationMs);
  }

  function renderBuffer() {
    var html = "";
    for (var i = 0; i < buffer.length; i++) {
      var ch = buffer[i];
      if (ch === "\n") {
        html += "<br>";
      } else if (ch === "<") {
        html += "&lt;";
      } else if (ch === ">") {
        html += "&gt;";
      } else if (ch === "&") {
        html += "&amp;";
      } else {
        html += ch;
      }
    }
    textEl.innerHTML = html;
    textEl.appendChild(cursorEl);
    textEl.scrollTop = textEl.scrollHeight;
  }

  function playSchedule() {
    if (schedule.length === 0) return;
    var pos = getPosition();

    var changed = false;
    while (scheduleIdx < schedule.length && schedule[scheduleIdx].time <= pos) {
      var ev = schedule[scheduleIdx];
      if (ev.action === "char") {
        buffer += ev.char;
      } else if (ev.action === "back") {
        buffer = buffer.slice(0, -1);
      } else if (ev.action === "nl") {
        buffer += "\n";
      }
      scheduleIdx++;
      changed = true;
    }

    if (changed) renderBuffer();
  }

  function resync(pos) {
    buffer = "";
    scheduleIdx = 0;
    while (scheduleIdx < schedule.length && schedule[scheduleIdx].time <= pos) {
      var ev = schedule[scheduleIdx];
      if (ev.action === "char") {
        buffer += ev.char;
      } else if (ev.action === "back") {
        buffer = buffer.slice(0, -1);
      } else if (ev.action === "nl") {
        buffer += "\n";
      }
      scheduleIdx++;
    }
    renderBuffer();
  }

  var lastPos = 0;
  function animate() {
    requestAnimationFrame(animate);
    var pos = getPosition();
    if (pos < lastPos - 1000) {
      resync(pos);
    } else {
      playSchedule();
    }
    lastPos = pos;
  }

  async function fetchLyrics(track, artist, album, dur) {
    var params = new URLSearchParams({ track: track, artist: artist });
    if (album) params.set("album", album);
    if (dur) params.set("duration", String(dur));

    try {
      var resp = await fetch("/api/lyrics?" + params.toString());
      if (!resp.ok) return;
      var data = await resp.json();

      if (data.synced && data.lines && data.lines.length > 0) {
        buildSchedule(data.lines);
        buffer = "";
        renderBuffer();
      } else if (data.lines && data.lines.length > 0) {
        schedule = [];
        scheduleIdx = 0;
        buffer = data.lines.map(function (l) { return l.text; }).join("\n");
        renderBuffer();
      } else {
        schedule = [];
        scheduleIdx = 0;
        buffer = "";
        renderBuffer();
      }
    } catch {
      schedule = [];
      scheduleIdx = 0;
      buffer = "";
      renderBuffer();
    }
  }

  async function poll() {
    try {
      var resp = await fetch("/api/now-playing");
      if (resp.status === 401 || !resp.ok) return;
      var data = await resp.json();

      if (!data.item) {
        isPlaying = false;
        if (currentTrackId !== null) {
          currentTrackId = null;
          schedule = [];
          scheduleIdx = 0;
          buffer = "";
          renderBuffer();
        }
        return;
      }

      isPlaying = data.is_playing;
      progressMs = data.progress_ms || 0;
      durationMs = data.item.duration_ms || 0;
      lastPollTime = performance.now();

      var trackId = data.item.id;
      if (trackId !== currentTrackId) {
        currentTrackId = trackId;
        document.title = data.item.name + " - Notepad";
        document.querySelector(".titlebar-text").innerHTML =
          '<span class="notepad-icon"></span> ' +
          data.item.name.replace(/</g, "&lt;") + " - Notepad";
        buffer = "";
        schedule = [];
        scheduleIdx = 0;
        renderBuffer();

        fetchLyrics(
          data.item.name,
          (data.item.artists || []).map(function (a) { return a.name; }).join(", "),
          data.item.album ? data.item.album.name : "",
          durationMs
        );
      }
    } catch {}
  }

  poll();
  setInterval(poll, 3000);
  requestAnimationFrame(animate);
})();
</script>

</body>
</html>
